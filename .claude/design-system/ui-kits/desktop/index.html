<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>RE:FORM — UI Kit (Desktop Web)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { background: #E8EBF0; margin: 0; }
  body { font-family: Pretendard, sans-serif; min-height: 100vh; transition: background .2s cubic-bezier(0.22,1,0.36,1); }
  body[data-theme="dark"] { background: #050E1A; color: #E8EEF4; }

  .stage-label {
    position: fixed; bottom: 20px; left: 20px; z-index: 50;
    font-family: 'IAMAPLAYER','Bebas Neue',sans-serif; font-size: 12px;
    letter-spacing: .1em; color: #5A6A7A;
    display: flex; align-items: center; gap: 14px;
    background: rgba(255,255,255,.85);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(13,27,42,.10);
    border-radius: 9999px;
    padding: 6px 8px 6px 16px;
    box-shadow: 0 4px 12px -2px rgba(0,33,71,.10);
  }
  body[data-theme="dark"] .stage-label { background: rgba(13,27,42,.85); border-color: rgba(255,255,255,.08); }
  .theme-toggle {
    display:inline-flex; align-items:center; gap:6px;
    background:#fff; border:1px solid rgba(13,27,42,.20);
    border-radius:9999px; padding:5px 12px; cursor:pointer;
    font-family:'IAMAPLAYER','Bebas Neue',sans-serif; font-size:11px;
    letter-spacing:.08em; color:#002147;
    transition:all .12s cubic-bezier(0.22,1,0.36,1);
  }
  .theme-toggle:hover { border-color:#002147; }
  body[data-theme="dark"] .theme-toggle { background: #0D1B2A; color: #E8EEF4; border-color: rgba(255,255,255,.16); }
  body[data-theme="dark"] .stage-label { color: #8B9BB0; }

  /* Dark surface overrides */
  body[data-theme="dark"] [data-surface] { background: #0D1B2A !important; color: #E8EEF4; }
  body[data-theme="dark"] [data-surface-2] { background: #142236 !important; }
  body[data-theme="dark"] [data-surface-sunken] { background: #081018 !important; }
  body[data-theme="dark"] [data-divider] { border-color: rgba(255,255,255,.08) !important; }
  body[data-theme="dark"] [data-text-main] { color: #E8EEF4 !important; }
  body[data-theme="dark"] [data-text-sub] { color: #8B9BB0 !important; }
  body[data-theme="dark"] [data-text-hint] { color: #5A6A7A !important; }
  body[data-theme="dark"] [data-card] {
    background: #0D1B2A !important; border-color: rgba(255,255,255,.08) !important;
    box-shadow: 0 8px 24px -4px rgba(0,0,0,.4) !important;
  }
  body[data-theme="dark"] [data-price] { color: #E8EEF4 !important; }
  body[data-theme="dark"] [data-chip] { background: #0D1B2A !important; border-color: rgba(255,255,255,.16) !important; color: #E8EEF4 !important; }
</style>
</head>
<body data-theme="light">
  <div class="stage-label">
    <span>RE:FORM · MARKETPLACE · DESKTOP WEB</span>
    <button id="themeBtn" class="theme-toggle" aria-label="Toggle theme">
      <span id="themeIcon">☀</span><span id="themeLabel">LIGHT</span>
    </button>
  </div>

  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="components/Shared.jsx"></script>
  <script type="text/babel" src="components/Listing.jsx"></script>
  <script type="text/babel" src="components/DesktopNav.jsx"></script>
  <script type="text/babel" src="components/DesktopScreens.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const { DesktopHeader, DesktopFooter, HomeScreenD, DetailScreenD, CommunityScreenD } = window.RF;

    function App() {
      const [nav, setNav] = useState('home');
      const [detail, setDetail] = useState(null);
      const [liked, setLiked] = useState(new Set(['a2']));
      const [dark, setDark] = useState(false);

      useEffect(() => {
        document.body.setAttribute('data-theme', dark ? 'dark' : 'light');
        document.getElementById('themeIcon').textContent = dark ? '☾' : '☀';
        document.getElementById('themeLabel').textContent = dark ? 'DARK' : 'LIGHT';
      }, [dark]);

      useEffect(() => {
        const btn = document.getElementById('themeBtn');
        const onClick = () => setDark(d => !d);
        btn.addEventListener('click', onClick);
        return () => btn.removeEventListener('click', onClick);
      }, []);

      const onLike = (id) => setLiked(prev => {
        const next = new Set(prev);
        if (next.has(id)) next.delete(id); else next.add(id);
        return next;
      });

      const onSelect = (item) => { setDetail(item); window.scrollTo({ top: 0 }); };
      const onBack = () => setDetail(null);

      let body;
      if (detail) {
        body = <DetailScreenD item={detail} liked={liked.has(detail.id)} onLike={onLike} onBack={onBack} dark={dark}/>;
      } else if (nav === 'community') {
        body = <CommunityScreenD dark={dark}/>;
      } else {
        body = <HomeScreenD liked={liked} onLike={onLike} onSelect={onSelect} dark={dark}/>;
      }

      return (
        <>
          <DesktopHeader dark={dark} active={detail ? 'market' : nav} onNav={(id) => { setDetail(null); setNav(id === 'market' ? 'home' : id); }}/>
          {body}
          <DesktopFooter dark={dark}/>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
